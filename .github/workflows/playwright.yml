name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Start backend
        run: |
          cd backend
          nohup npm start > backend.log 2>&1 &

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: |
          nohup npx vite preview --port 3000 > preview.log 2>&1 &

      - name: Wait for preview to be ready
        run: |
          for i in {1..30}; do
            if curl -sSf "http://localhost:3000/vintage-car-gallery/" >/dev/null; then
              echo "preview ready" && break
            fi
            sleep 1
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
